<!DOCTYPE html>
<html lang="es">
<head>

  <!--Bootstrap-->

  <!--CSS-->

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="assets/img/viajes.svg" alt="logo viajes Chile" class="logo-viajes">
      Viajes Chile
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarViajes" aria-controls="navbarViajes" aria-expanded="false" aria-label="Menú">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarViajes">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="#inicio">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#quienes-somos">Quiénes somos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#destacados">Destacados</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#contacto">Contacto</a>
        </li>
      </ul>
    </div>
  </div>

<header id="inicio">
  <div id="carouselViajes" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="assets/img/carousel1.jpg" class="d-block w-100" alt="Paisaje del norte de Chile">
      </div>

      <div class="carousel-item">
        <img src="assets/img/carousel2.jpg" class="d-block w-100" alt="Paisaje del sur de Chile">
      </div>

      <div class="carousel-item">
        <img src="assets/img/carousel3.jpg" class="d-block w-100" alt="Paisaje de Chile">
      </div>

    </div>

      <span class="visually-hidden">Anterior</span>
    </button>

      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Siguiente</span>
